server:
  port: ${SERVER_PORT:8080}

spring:
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI}
  data:
    mongodb:
      auto-index-creation: ${MONGO_AUTO_INDEX:true}

logging:
  level:
    root: WARN
    "[com.github.dghng36.eauction]": INFO

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

  jwt:
    secret: ${JWT_SECRET:}
    algorithm: ${JWT_ALGORITHM:HS256}
    access-token-expiration-mins: ${JWT_ACCESS_TOKEN_EXPIRATION_MINS:60}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}

  cookie:
    name: ${COOKIE_NAME:refresh_token}
    http-only: ${COOKIE_HTTP_ONLY:true}
    secure: ${COOKIE_SECURE:false}
    max-age: ${COOKIE_MAX_AGE:604800}
    same-site: ${COOKIE_SAME_SITE:Lax}

  payment:
    vnpay:
      api-version: "2.1.0"
      command: pay
      api-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      tmn-code: ${VNP_TMN_CODE:}
      hash-secret: ${VNP_HASH_SECRET:}
      return-url: ${VNP_RETURN_URL:http://localhost:8080/api/v1/payments/callback/vnpay}
      locale: vn
      currency-code: VND
      ip-address: 127.0.0.1

    sepay:
      api-key: ${SEPAY_API_KEY:SePay-Api-Test-Key}
      company-bank-account: ${SEPAY_BANK_ACCOUNT:SePayBankAccountTest}
      company-bank-name: ${SEPAY_BANK_NAME:BankNameTest}

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:}
